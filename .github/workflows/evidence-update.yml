name: Update evidence baselines

# Canonical-environment baseline refresh (#5, design #21): reruns the browser
# suite with --update-snapshots on the same Ubuntu runner CI uses (the
# canonical rendering environment) and commits the refreshed screenshots +
# evidence.json back to the selected branch. Run it from the Actions tab
# against a feature branch whenever captures change.

on:
  workflow_dispatch:
  # TEMPORARY bootstrap trigger: workflow_dispatch only registers once this
  # file reaches the default branch, so the first baseline generation runs on
  # push to this feature branch. Removed before merge.
  push:
    branches: [5-evidence-pipeline]

permissions:
  contents: write

concurrency:
  group: evidence-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-evidence:
    name: Refresh baselines and evidence.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate baselines and evidence.json
        run: npm run evidence:update

      - name: Commit refreshed evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/evidence
          if git diff --cached --quiet; then
            echo "Evidence already up to date — nothing to commit."
          else
            git commit -m "Update evidence baselines (canonical environment refresh)"
            git push
          fi
