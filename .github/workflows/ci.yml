name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, format, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Check dist/ matches a fresh build
        run: npm run build:check-dist

      - name: Run unit tests
        run: npm test

      - name: Build docs site (link + evidence validation)
        run: npm run site

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e -- --project=chromium

      - name: Evidence freshness guard
        run: npm run evidence:check

      # Requirement text shown on the evidence pages is vendored from the
      # reviewed matrices in the public obot.agent repo (#63). Check it out and
      # assert the committed docs/requirements/*.json still match, so an
      # upstream matrix edit surfaces here instead of drifting silently.
      - name: Checkout requirement matrices (obot.agent)
        uses: actions/checkout@v4
        with:
          repository: jwildfire/obot.agent
          path: .requirements-src

      - name: Requirement-text sync guard
        run: npm run requirements:check
        env:
          REQUIREMENTS_SRC: .requirements-src/docs/requirements

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
