<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>safety.viz histogram demo page</title>
  </head>
  <body>
    <h1 id="histogram-heading">safety.viz histogram demo</h1>
    <p>
      Demo and Playwright harness page for the histogram module (#2). Loads the committed IIFE
      bundle — the same asset gsm.safety vendors — against the fixture data in
      <code>adbds.csv</code>.
    </p>
    <div id="container"></div>
    <!-- Bundle path tracks the package.json version; bump them together. -->
    <script src="/dist/safety.viz-1.0.0/safety.viz.js"></script>
    <script>
      function parseCsv(text) {
        const [header, ...lines] = text.trim().split(/\r?\n/);
        const cols = header.split(',');
        return lines.map((line) => {
          const cells = line.split(',');
          return Object.fromEntries(cols.map((col, i) => [col, cells[i] ?? '']));
        });
      }

      fetch('./adbds.csv')
        .then((response) => response.text())
        .then((text) => {
          const instance = SafetyViz.histogram('#container', {
            filters: [
              { value_col: 'SITEID', label: 'Site ID' },
              { value_col: 'SEX', label: 'Sex' },
              { value_col: 'RACE', label: 'Race' },
              { value_col: 'ARM', label: 'Treatment Group' },
              { value_col: 'USUBJID', label: 'Participant ID' }
            ],
            groups: [
              { value_col: 'SITE', label: 'Site' },
              { value_col: 'SEX', label: 'Sex' },
              { value_col: 'RACE', label: 'Race' },
              { value_col: 'ARM', label: 'Treatment Group' }
            ],
            display_normal_range: true,
            annotate_bin_boundaries: true,
            test_normality: true,
            group_by: 'ARM',
            compare_distributions: true
          });
          window.__safetyHistogramInstance = instance;
          instance.init(parseCsv(text));
        })
        .catch((error) => {
          console.error(error);
          document.querySelector('#container').textContent =
            `Failed to load demo data: ${error.message}`;
        });
    </script>
  </body>
</html>
