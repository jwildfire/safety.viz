<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>safety.viz ae-timelines demo page</title>
  </head>
  <body>
    <h1 id="ae-timelines-heading">safety.viz ae-timelines demo</h1>
    <p>
      Demo and Playwright harness page for the ae-timelines module (#26). Loads the committed IIFE
      bundle — the same asset gsm.safety vendors — against the hand-crafted fixture data in
      <code>adae.csv</code>.
    </p>
    <div id="container"></div>
    <!-- Bundle path tracks the package.json version; bump them together. -->
    <script src="/dist/safety.viz-1.2.0/safety.viz.js"></script>
    <script>
      function parseCsv(text) {
        const [header, ...lines] = text.trim().split(/\r?\n/);
        const cols = header.split(',');
        return lines.map((line) => {
          const cells = line.split(',');
          return Object.fromEntries(cols.map((col, i) => [col, cells[i] ?? '']));
        });
      }

      fetch('./adae.csv')
        .then((response) => response.text())
        .then((text) => {
          const instance = SafetyViz.aeTimelines('#container', {
            filters: [
              { value_col: 'AESER', label: 'Serious Event' },
              { value_col: 'AESEV', label: 'Severity/Intensity' },
              { value_col: 'SEX', label: 'Sex' },
              { value_col: 'USUBJID', label: 'Participant Identifier' }
            ]
          });
          window.__aeTimelinesInstance = instance;
          const selections = [];
          window.__aetParticipantsSelected = selections;
          document.querySelector('#container').addEventListener('participantsSelected', (event) => {
            selections.push(event.detail.data);
          });
          instance.init(parseCsv(text));
        })
        .catch((error) => {
          console.error(error);
          document.querySelector('#container').textContent =
            `Failed to load demo data: ${error.message}`;
        });
    </script>
  </body>
</html>
