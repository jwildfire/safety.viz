<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>safety.viz results-over-time demo page</title>
  </head>
  <body>
    <h1 id="results-over-time-heading">safety.viz results-over-time demo</h1>
    <p>
      Demo and Playwright harness page for the results-over-time module (#27). Loads the committed
      IIFE bundle — the same asset gsm.safety vendors — against the fixture data in
      <code>results-over-time.csv</code>.
    </p>
    <div id="container"></div>
    <!-- Bundle path tracks the package.json version; bump them together. -->
    <script src="/dist/safety.viz-1.0.0/safety.viz.js"></script>
    <script>
      function parseCsv(text) {
        const [header, ...lines] = text.trim().split(/\r?\n/);
        const cols = header.split(',');
        return lines.map((line) => {
          const cells = line.split(',');
          return Object.fromEntries(cols.map((col, i) => [col, cells[i] ?? '']));
        });
      }

      fetch('./results-over-time.csv')
        .then((response) => response.text())
        .then((text) => {
          const instance = SafetyViz.resultsOverTime('#container', {
            filters: [
              { value_col: 'SEX', label: 'Sex' },
              { value_col: 'ARM', label: 'Treatment Group' }
            ],
            groups: [
              { value_col: 'ARM', label: 'Treatment Group' },
              { value_col: 'SEX', label: 'Sex' }
            ],
            group_by: 'ARM'
          });
          window.__safetyResultsOverTimeInstance = instance;
          instance.init(parseCsv(text));
        })
        .catch((error) => {
          console.error(error);
          document.querySelector('#container').textContent =
            `Failed to load demo data: ${error.message}`;
        });
    </script>
  </body>
</html>
